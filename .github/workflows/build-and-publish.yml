name: Build and Publish NuGet Package

on:
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to NuGet.org'
        required: false
        type: boolean
        default: false

env:
  DOTNET_VERSION: '8.0.x'
  PROJECT_PATH: 'Missionware.LibWebrtcSharp.Android/Missionware.LibWebrtcSharp.Android.csproj'
  CONFIGURATION: 'Release'
  ANDROID_SDK_VERSION: '34'

jobs:
  build:
    name: Build Package
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Full history for versioning
        lfs: true  # Enable Git LFS for large binary files like AAR

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Setup Java (required for Android builds)
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        api-level: ${{ env.ANDROID_SDK_VERSION }}
        build-tools-version: '34.0.0'
        
    - name: Install .NET Android workload
      run: |
        dotnet workload install android --skip-manifest-update
        dotnet workload list
   
    - name: Install MAUI workload
      run: |
         dotnet workload install maui   
   
    - name: Display build environment info
      run: |
        dotnet --info
        java -version
        echo "ANDROID_HOME=$env:ANDROID_HOME"
        echo "ANDROID_SDK_ROOT=$env:ANDROID_SDK_ROOT"

    - name: Clean build artifacts
      run: |
        if (Test-Path "Missionware.LibWebrtcSharp.Android/obj") { Remove-Item -Recurse -Force "Missionware.LibWebrtcSharp.Android/obj" }
        if (Test-Path "Missionware.LibWebrtcSharp.Android/bin") { Remove-Item -Recurse -Force "Missionware.LibWebrtcSharp.Android/bin" }

    - name: Restore dependencies
      run: dotnet restore ${{ env.PROJECT_PATH }} -v detailed

    - name: Build project
      run: |
        dotnet build ${{ env.PROJECT_PATH }} `
          --configuration ${{ env.CONFIGURATION }} `
          --no-restore `
          -p:AndroidSdkDirectory="$env:ANDROID_HOME" `
          -p:JavaSdkDirectory="$env:JAVA_HOME" `
          -v detailed `
          -bl:build.binlog

    - name: Pack NuGet package
      run: |
        dotnet pack ${{ env.PROJECT_PATH }} `
          --configuration ${{ env.CONFIGURATION }} `
          --no-build `
          --output ./artifacts `
          -p:IncludeSymbols=false `
          -v detailed

    - name: List package contents
      run: |
        Get-ChildItem ./artifacts -Recurse
        $package = Get-ChildItem ./artifacts/*.nupkg | Select-Object -First 1
        Write-Host "Package: $($package.Name)"
        Write-Host "Size: $([math]::Round($package.Length / 1MB, 2)) MB"

    - name: Upload NuGet package artifact
      uses: actions/upload-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts/*.nupkg
        retention-days: 7

    - name: Upload build logs (on failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-logs
        path: |
          **/*.binlog
          **/obj/**/*.log
          **/*log.txt
        retention-days: 3

  publish:
    name: Publish to NuGet.org
    needs: build
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
    
    environment:
      name: nuget-production
      url: https://www.nuget.org/packages/Missionware.LibWebrtcSharp.Android
    
    steps:
    - name: Download NuGet package artifact
      uses: actions/download-artifact@v4
      with:
        name: nuget-package
        path: ./artifacts

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Publish to NuGet.org
      run: |
        dotnet nuget push ./artifacts/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate
      env:
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    - name: Create GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: ./artifacts/*.nupkg
        generate_release_notes: true
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
