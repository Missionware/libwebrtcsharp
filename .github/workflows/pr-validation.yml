name: PR Validation

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'Missionware.LibWebrtcSharp.Android/**'
      - '.github/workflows/**'
      - 'scripts/**'

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: 'Missionware.LibWebrtcSharp.Android/Missionware.LibWebrtcSharp.Android.csproj'
  CONFIGURATION: 'Release'

jobs:
  validate:
    name: Validate PR Build
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        global-json-file: global.json

    - name: Setup Java (required for Android builds)
      uses: actions/setup-java@v4
      with:
        distribution: 'microsoft'
        java-version: '17'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install .NET Android workload
      run: dotnet workload install android --skip-manifest-update

    - name: Install .NET MAUI workload
      run: dotnet workload install maui

    - name: Build and Pack project
      shell: pwsh
      run: |
        .\scripts\build-and-pack.ps1 -Configuration ${{ env.CONFIGURATION }} -Verbose

    - name: Validate package metadata
      shell: pwsh
      run: |
        $package = Get-ChildItem -Path .\artifacts\*.nupkg | Select-Object -First 1
        Write-Host "Package created: $($package.Name)"
        Write-Host "Package size: $([math]::Round($package.Length / 1MB, 2)) MB"
        
        # Check if package contains required files
        Add-Type -AssemblyName System.IO.Compression.FileSystem
        $zip = [System.IO.Compression.ZipFile]::OpenRead($package.FullName)
        
        $entryNames = $zip.Entries | ForEach-Object { $_.FullName }

        $hasManagedAssembly = $entryNames | Where-Object {
          $_ -like "lib/net9.0-android*/Missionware.LibWebrtcSharp.Android.dll" -or
          $_ -like "ref/net9.0-android*/Missionware.LibWebrtcSharp.Android.dll"
        }

        $hasLicenses = $entryNames | Where-Object { $_ -like "licenses/*" }

        if ($hasManagedAssembly) {
          Write-Host "? Found: managed assembly (lib/ref net9.0-android*)"
        } else {
          Write-Host "? Missing: managed assembly in lib/ref net9.0-android*"
          exit 1
        }

        if ($hasLicenses) {
          Write-Host "? Found: licenses/"
        } else {
          Write-Host "? Missing: licenses/"
          exit 1
        }
        
        $zip.Dispose()
        Write-Host "Package validation passed!"

    - name: Comment PR with package info
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          const artifactsDir = './artifacts';
          const files = fs.readdirSync(artifactsDir);
          const nupkgFile = files.find(f => f.endsWith('.nupkg'));
          
          if (nupkgFile) {
            const stats = fs.statSync(path.join(artifactsDir, nupkgFile));
            const sizeMB = (stats.size / (1024 * 1024)).toFixed(2);
            
            const comment = `### ?? NuGet Package Build Results
            
            ? Package built successfully!
            
            **Package:** \`${nupkgFile}\`
            **Size:** ${sizeMB} MB
            
            The package is ready for publication once this PR is merged.`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
